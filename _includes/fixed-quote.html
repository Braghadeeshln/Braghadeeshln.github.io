<div id="fixed-quote" style="position: fixed; top: 120px; left: 10px; width: 250px; text-align: left; font-size: 0.8em; color: #555; font-family: 'Georgia', serif; z-index: 99999;">
  <p>
    नीतिज्ञा नियतिज्ञा वेदज्ञा अपि भवन्ति शास्त्रज्ञाः ।<br>
    ब्रह्मज्ञा अपि लभ्या स्वाज्ञानज्ञानिनो विरलाः ॥
  </p>
  <p style="font-style: italic;">
    "Many understand ethics, discipline, the Vedas, and scriptures, or even Brahman itself; rare are those aware of their own ignorance."
  </p>
  <p style="font-size: 0.7em; color: #777;">
    — *Vairagya Shataka*
  </p>
</div>

<script>
  // JavaScript enforcement for fixed positioning
  document.addEventListener("DOMContentLoaded", function() {
    const fixedQuote = document.getElementById("fixed-quote");
    if (fixedQuote) {
      fixedQuote.style.position = "fixed";
      fixedQuote.style.top = "120px";
      fixedQuote.style.left = "10px";
      fixedQuote.style.width = "250px";
      fixedQuote.style.textAlign = "left";
      fixedQuote.style.fontSize = "0.8em";
      fixedQuote.style.color = "#555";
      fixedQuote.style.fontFamily = "'Georgia', serif";
      fixedQuote.style.zIndex = "99999";
    }
  });
</script>
